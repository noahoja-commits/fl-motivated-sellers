[theme]
base = "dark"
primaryColor = "#9ee29e"
backgroundColor = "#0a0a0a"
secondaryBackgroundColor = "#141414"
textColor = "#e6e6e6"
font = "sans serif"

[browser]
gatherUsageStats = false

[server]
headless = true
# HF's reverse proxy mangles compressed WS frames -> blank page; disable all three.
enableCORS = false
enableXsrfProtection = false
enableWebsocketCompression = false
